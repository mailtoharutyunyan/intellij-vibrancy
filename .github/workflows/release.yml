name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vibrancy ${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            1. Download **Vibrancy-${{ steps.version.outputs.VERSION }}.zip** below
            2. In IntelliJ IDEA: **Settings → Plugins → Install Plugin from Disk...**
            3. Select the downloaded `.zip` file
            4. Restart the IDE

            **Requirements:** macOS (Intel or Apple Silicon), IntelliJ IDEA 2024.3+
          files: build/distributions/*.zip
          generate_release_notes: true
